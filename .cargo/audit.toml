# cargo-audit configuration.
[advisories]
# RUSTSEC-2023-0071 — the `rsa` crate's "Marvin" timing side-channel. Pulled transitively by
# sqlx-postgres; no fixed release of `rsa` exists yet. Not exploitable in Ziqpu: the sidecar
# authenticates to a local/private Postgres via SCRAM/md5 and never performs RSA key operations.
# This is a narrow, deliberate exception — every other advisory still fails the security gate.
# Revisit and remove when a patched `rsa` is published.
ignore = ["RUSTSEC-2023-0071"]
