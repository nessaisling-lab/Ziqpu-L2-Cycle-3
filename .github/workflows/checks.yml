name: checks

# Reusable "gauntlet core" — the stability/function/security jobs that BOTH the CI
# workflow (ci.yml) and the Release workflow (release.yml) depend on. Kept in one place
# via `workflow_call` so the two callers can never drift (they used to duplicate the
# security job verbatim). CI adds stability/desktop/anise on top; Release gates the
# bundle on this whole file.
on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---- stability gate: tests pass on all three OSes ----
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude ui --all-features --locked

  # ---- function smoke testing gate (all three OSes) ----
  smoke:
    name: smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Function smoke tests
        run: cargo test -p engine --test smoke --all-features --locked
      - name: Agent-loop evals (tool order · checkpoint · guardrail)
        run: cargo test -p agents --test loop --locked
      - name: MCP server (tools + checkpoint at the protocol boundary)
        run: cargo test -p mcp --locked

  # ---- security gate: advisories + license/ban policy + secret scan + bundled assets ----
  security:
    name: security (audit + deny + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - name: License + ban + advisory policy (deny.toml is the source of truth)
        # `cargo deny check` runs all four (advisories, bans, licenses, sources), so deny.toml's
        # yanked=deny and its accepted-advisory ignore-list are actually enforced (they were inert
        # when CI ran only `licenses bans sources`).
        run: cargo deny check
      - name: Advisory audit (second layer)
        # Belt-and-suspenders alongside `cargo deny check advisories` — same accepted advisory.
        run: cargo audit --ignore RUSTSEC-2023-0071
      - name: Bundled-asset licenses (fonts + data — outside the Cargo graph)
        # cargo-deny only sees the dependency graph, so redistributed assets are checked here:
        # the OFL fonts must ship their license text + be attributed, and GeoNames its CC-BY line.
        run: |
          set -euo pipefail
          test -f LICENSES/OFL-1.1.txt || { echo "::error::missing LICENSES/OFL-1.1.txt for the bundled OFL fonts"; exit 1; }
          grep -qi "Open Font License" NOTICE || { echo "::error::NOTICE must reference the SIL Open Font License for the bundled fonts"; exit 1; }
          for f in "Cinzel Decorative" "Spectral" "Noto Sans Cuneiform"; do
            grep -q "$f" NOTICE || { echo "::error::NOTICE is missing bundled font: $f"; exit 1; }
          done
          grep -qi "GeoNames" NOTICE || { echo "::error::NOTICE must attribute GeoNames (CC BY 4.0) for the bundled gazetteer"; exit 1; }
          echo "bundled-asset licenses ok"
      - name: Secret scan
        # Direct gitleaks binary (filesystem scan of the checkout) instead of the action, which
        # mis-handles a PR whose base is the repo's root commit. Config allowlists the dev-only
        # DB credential and generated data; every real secret pattern still fails the job.
        run: |
          ver=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" | tar -xzf - -C /tmp gitleaks
          /tmp/gitleaks dir . --config .gitleaks.toml --redact --no-banner --exit-code 1

  # ---- integration: run the sidecar against a real Postgres and probe the endpoints ----
  integration:
    name: integration (sidecar + Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ziqpu
          POSTGRES_PASSWORD: ziqpu_dev
          POSTGRES_DB: ziqpu
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ziqpu -d ziqpu"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://ziqpu:ziqpu_dev@localhost:5433/ziqpu
      PGPASSWORD: ziqpu_dev
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Apply schema + seed
        run: |
          for f in db/init/*.sql; do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q -f "$f"
          done
          echo -n "seeded tickers: "; psql "$DATABASE_URL" -tAc "SELECT count(*) FROM company_metadata;"
      - name: Cache DE440s kernel
        uses: actions/cache@v4
        with:
          path: ./data/ephemeris/de440s.bsp
          key: de440s-v1
      - name: Fetch DE440s kernel (for the ANISE backend)
        run: bash scripts/fetch-ephemeris.sh
      - name: Build sidecar (ANISE backend)
        run: cargo build -p sidecar --features anise
      - name: Run sidecar and assert endpoints
        run: |
          cargo run -p sidecar --features anise &
          pid=$!
          for _ in $(seq 1 40); do curl -sf http://localhost:8787/health >/dev/null && break || sleep 1; done
          echo "== /chart/AAPL =="
          chart=$(curl -sf http://localhost:8787/chart/AAPL)
          echo "$chart" | grep -q '"backend":"ANISE/DE440"'
          echo "  backend = ANISE/DE440: OK"
          echo "$chart" | grep -q '"sign":"Sagittarius"'
          echo "  AAPL Sun in Sagittarius: OK"
          echo "$chart" | grep -q '"body":"Pluto"'
          echo "  Pluto present: OK"
          echo "$chart" | grep -q '"body":"Chiron"'
          echo "  Chiron present: OK"
          echo "== /synastry/AAPL/MSFT =="
          curl -sf http://localhost:8787/synastry/AAPL/MSFT | grep -q '"aspect"'
          echo "  cross-aspects present: OK"
          echo "== edge: unknown ticker -> 404 =="
          [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8787/chart/ZZZZ)" = "404" ]
          echo "  404: OK"
          echo "== edge: date-unknown ticker -> 422 =="
          nd=$(psql "$DATABASE_URL" -tAc "SELECT ticker FROM company_metadata WHERE ipo_date IS NULL LIMIT 1" | tr -d '[:space:]')
          [ "$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:8787/chart/$nd")" = "422" ]
          echo "  422 ($nd): OK"
          kill "$pid"
