name: CI

on:
  push:
    branches: [main, nightfall]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---- the shared gauntlet core: test (3-OS) · smoke (3-OS) · security · integration ----
  # Defined once in checks.yml (workflow_call) so CI and Release can't drift.
  checks:
    uses: ./.github/workflows/checks.yml

  # ---- stability gate: formatting + lint ----
  stability:
    name: stability (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --exclude ui --all-targets --all-features -- -D warnings

  # ---- desktop UI build-only gate (Dioxus): compiles on all three OSes ----
  desktop:
    name: desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Linux WebKitGTK/GTK system deps (Dioxus desktop)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev libxdo-dev libayatana-appindicator3-dev libssl-dev pkg-config build-essential
      - run: cargo build -p ui --locked

  # ---- anise: fetch the JPL DE440 kernel and cross-check the analytic backend (<1 deg) ----
  anise:
    name: anise cross-check (DE440)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache DE440s kernel
        uses: actions/cache@v4
        with:
          path: ./data/ephemeris/de440s.bsp
          key: de440s-v1
      - name: Fetch DE440s kernel (public-domain JPL data)
        run: bash scripts/fetch-ephemeris.sh
      - name: Analytic vs ANISE cross-check
        run: cargo test -p ephemeris --features anise-backend -- --ignored
