name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on all PR commits
        run: |
          set -euo pipefail
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          missing=0
          for sha in $(git rev-list "$base..$head"); do
            if ! git log -1 --format=%B "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha is missing a Signed-off-by line (DCO). Use 'git commit -s'."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "DCO check failed — see https://developercertificate.org/ ; sign commits with 'git commit -s'."
            exit 1
          fi
          echo "All PR commits carry a Signed-off-by line."
