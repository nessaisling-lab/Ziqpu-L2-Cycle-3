# cargo-deny configuration.
#
# Purpose: keep the PUBLIC dependency tree permissive-only. A single AGPL/GPL/SSPL
# dependency in-tree would poison the future closed-source commercial edition, so
# copyleft licenses are denied by omission from the allow-list below. MPL-2.0 is
# permitted (file-level copyleft only; the optional ANISE ephemeris backend is MPL-2.0 — the
# default backend is the pure-Rust analytic/vsop87 one).
#
# Our own workspace crates carry PolyForm Noncommercial 1.0.0 (not an SPDX/OSI id);
# they are `publish = false`, so `private.ignore = true` exempts them from this check.

[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    # Permissive, non-copyleft licenses in the ANISE ephemeris tree:
    "BlueOak-1.0.0",        # modern MIT-like permissive license
    "CDLA-Permissive-2.0",  # permissive data-sharing license (no copyleft)
]
confidence-threshold = 0.9
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
yanked = "deny"
# Accepted UNMAINTAINED advisories (audit 2026-07-09). These are informational
# "no longer maintained" flags, NOT security vulnerabilities — there is zero known
# exploit in any of them, and licenses/bans/sources stay clean. All are TRANSITIVE:
#   * gtk-rs GTK3 bindings family (atk*, gdk*, gtk*, gdkx11*, gdkwayland*, gtk3-macros)
#     come in via the Dioxus 0.6 / WRY Linux desktop stack (`crates/ui`). Upstream moved
#     to GTK4, but WRY still targets GTK3 on Linux — every Rust webview desktop app carries
#     these. Re-evaluate when WRY migrates to GTK4.
#   * proc-macro-error / proc-macro-error2 / instant / fxhash — small transitive build-time
#     macro + hashing helpers with no maintained drop-in we control.
ignore = [
    # Vulnerability exception (not unmaintained): rsa "Marvin" timing side-channel, pulled
    # transitively by sqlx-postgres. Not exploitable here — the sidecar authenticates via
    # SCRAM/md5, never RSA key ops. Also ignored in cargo audit + .cargo/audit.toml + SECURITY.md,
    # so both tools share one accepted-advisory policy now that `cargo deny check` runs advisories.
    "RUSTSEC-2023-0071", # rsa — Marvin timing attack (transitive, sqlx-postgres; not exploitable)
    "RUSTSEC-2024-0370", # proc-macro-error — unmaintained (transitive, build-time)
    "RUSTSEC-2024-0384", # instant — unmaintained (transitive)
    "RUSTSEC-2024-0411", # gtk-rs GTK3 bindings — unmaintained (WRY desktop stack)
    "RUSTSEC-2024-0412", # gtk-rs GTK3 bindings — unmaintained
    "RUSTSEC-2024-0413", # gtk-rs GTK3 bindings — unmaintained
    "RUSTSEC-2024-0414", # gtk-rs GTK3 bindings — unmaintained
    "RUSTSEC-2024-0415", # gtk-rs GTK3 bindings — unmaintained
    "RUSTSEC-2024-0416", # gtk-rs GTK3 bindings — unmaintained
    "RUSTSEC-2024-0417", # gtk-rs GTK3 bindings — unmaintained
    "RUSTSEC-2024-0418", # gtk-rs GTK3 bindings — unmaintained
    "RUSTSEC-2024-0419", # gtk-rs GTK3 bindings — unmaintained
    "RUSTSEC-2024-0420", # gtk-rs GTK3 bindings — unmaintained
    "RUSTSEC-2025-0057", # fxhash — unmaintained (transitive)
    "RUSTSEC-2026-0173", # proc-macro-error2 — unmaintained (transitive, build-time)
]

[sources]
unknown-registry = "deny"
unknown-git = "allow"
